# Deploy Astro site to GitHub Pages
# Triggered on push to main or manual dispatch.
# Site: https://adam.mooz.ca
#
name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow GitHub Actions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment at a time; do not cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.BUILD_PATH }}

      - name: Inject Decap CMS app_id
        # DECAP_APP_ID is a GitHub Actions variable (not a secret — the Client ID is public).
        # Set it at: Settings → Secrets and variables → Actions → Variables tab → DECAP_APP_ID
        run: |
          sed -i "s/YOUR_GITHUB_OAUTH_APP_CLIENT_ID/${{ vars.DECAP_APP_ID }}/g" public/admin/config.yml
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        # Pass the Pages origin and base path so Astro generates correct asset URLs.
        # For a custom domain (adam.mooz.ca) the base_path will be empty.
        run: |
          bun astro build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
